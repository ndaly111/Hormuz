name: Daily PortWatch refresh

on:
  schedule:
    # Run every day at 06:00 UTC. PortWatch updates Tuesdays 13:00 UTC,
    # so a daily run keeps things fresh without missing the update.
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      force_post:
        description: "Post to Bluesky even if data did not change (for testing)"
        required: false
        default: "false"
        type: choice
        options: [ "false", "true" ]
      dry_run_post:
        description: "Render image + log caption, but skip actual Bluesky post"
        required: false
        default: "false"
        type: choice
        options: [ "false", "true" ]
      share_range:
        description: "Chart range for the post"
        required: false
        default: "war"
        type: choice
        options: [ "d7", "d30", "closure", "war", "all" ]

permissions:
  contents: write

concurrency:
  group: daily-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: pipeline/requirements.txt

      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Run pipeline
        run: python pipeline/fetch_portwatch.py

      - name: Commit updated data (if changed)
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add site/data/transits.json
          if git diff --cached --quiet; then
            echo "No data changes to commit."
            echo "data_changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "Daily refresh: PortWatch data through $(date -u +%Y-%m-%d)"
            git push
            echo "data_changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Playwright browser
        if: steps.commit.outputs.data_changed == 'true' || inputs.force_post == 'true'
        run: python -m playwright install --with-deps chromium

      - name: Post update to Bluesky
        if: steps.commit.outputs.data_changed == 'true' || inputs.force_post == 'true'
        env:
          BLUESKY_HANDLE: hormuz-traffic.bsky.social
          BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}
          SHARE_RANGE_KEY: ${{ inputs.share_range || 'war' }}
        run: |
          if [ "${{ inputs.dry_run_post }}" = "true" ]; then
            python pipeline/post_bluesky.py --dry-run
          else
            python pipeline/post_bluesky.py
          fi

      - name: Upload dry-run preview
        if: inputs.dry_run_post == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: bluesky-dry-run-preview
          path: pipeline/_latest_share.png
          if-no-files-found: ignore
