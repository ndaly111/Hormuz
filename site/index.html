<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Strait of Hormuz Traffic Tracker — Daily Ship Transit Data</title>
  <meta name="description" content="Daily transit counts for the Strait of Hormuz, with annotated geopolitical events from 2019 to today. Free, public-facing, updated daily from IMF PortWatch satellite AIS data." />

  <meta property="og:title" content="Strait of Hormuz Traffic Tracker" />
  <meta property="og:description" content="Daily ship transit data for the Strait of Hormuz, updated from satellite AIS. See how the 2026 closure compares to history." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://hormuz-traffic.com" />

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Strait of Hormuz Traffic Tracker" />
  <meta name="twitter:description" content="Daily ship transit data for the Strait of Hormuz, with annotated events from 2019 to today." />

  <link rel="stylesheet" href="styles.css" />

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.1.0/dist/chartjs-plugin-annotation.min.js"></script>
</head>
<body>
  <header class="compact">
    <div class="container header-row">
      <div class="brand">
        <h1>Strait of Hormuz Traffic Tracker</h1>
      </div>
      <nav class="top-nav" aria-label="Primary">
        <a href="/" class="nav-link active">Data</a>
        <a href="/about" class="nav-link">About</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <section class="stats" id="stats">
      <!-- populated by app.js -->
    </section>

    <section class="chart-section">
      <div class="chart-toolbar">
        <div class="range-buttons" role="group" aria-label="Date range">
          <button class="range-btn" data-range="all" title="All time (2019 – present)">All time</button>
          <button class="range-btn" data-range="war" title="Iran war era (Jun 2025 – present)">Iran war</button>
          <button class="range-btn active" data-range="closure" title="Closure (Feb 2026 – present)">Closure</button>
        </div>
        <button class="icon-btn" id="downloadBtn" title="Download chart as PNG for sharing" aria-label="Download chart">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="7 10 12 15 17 10"/>
            <line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
          <span>Image</span>
        </button>
      </div>

      <div class="chart-wrap">
        <canvas id="mainChart"></canvas>
        <div class="chart-watermark">hormuz-traffic.com</div>
      </div>

      <div class="event-list" id="eventList">
        <!-- populated by app.js: rich rows with date + label + source -->
      </div>
    </section>

    <section class="vessel-section">
      <div class="chart-header">
        <h2>Vessel mix — last 90 days</h2>
        <p class="chart-sub">Tankers carry the strait's strategic importance. Other cargo is the rest.</p>
      </div>
      <div class="chart-wrap small">
        <canvas id="vesselChart"></canvas>
      </div>
    </section>
  </main>

  <footer>
    <div class="container">
      <p>
        Data: <a href="https://portwatch.imf.org" rel="noopener" target="_blank">IMF PortWatch</a> ·
        <a href="/about">About &amp; methodology</a> ·
        Last updated: <span id="updatedAt">—</span>
      </p>
    </div>
  </footer>

  <script src="app.js"></script>
</body>
</html>
